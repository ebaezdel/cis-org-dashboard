name: Jira Sync

on:
  schedule:
    - cron: '*/15 12-23 * * 1-5'  # Mon-Fri morning/afternoon: 6am-5:59pm CST (7am-6:59pm CDT)
    - cron: '*/15 0-3 * * 2-6'    # Mon-Fri evening: 6pm-9:59pm CST — crosses midnight UTC so days shift +1
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Jira sync
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node scripts/sync.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: Jira sync $(date -u +'%Y-%m-%dT%H:%M')Z"
          git push
