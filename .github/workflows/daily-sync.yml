name: Daily Jira Sync

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 7:00 AM CST (UTC-6) = 13:00 UTC, Mon-Fri
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Jira sync
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node scripts/sync.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: daily Jira sync $(date -u +'%Y-%m-%d')"
          git push
